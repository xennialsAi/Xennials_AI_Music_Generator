    <script>
        // Polyfill/Bypass window.fetch setter safety block for legacy library bundling compatibility
        try {
            let currentFetch = window.fetch;
            if (currentFetch) {
                Object.defineProperty(window, 'fetch', {
                    get() {
                        return currentFetch;
                    },
                    set(newFetch) {
                        currentFetch = newFetch;
                    },
                    configurable: true,
                    enumerable: true
                });
            }
        } catch (e) {
            console.warn("Unable to override window.fetch descriptors:", e);
        }
    </script>

    </script>
